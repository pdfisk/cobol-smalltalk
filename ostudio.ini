" This file contains startup initialization settings for ObjectStudio "

":Part - KeyBindings"

" This section of ostudio.ini contains a keyboard binding table for the "
" TextEditor. It is read in the class initialize method of the TextEditor 	"
" Item. Implemented here are the bindings corresponding to the 'Brief' editor "

" Copyright 2000-2012 Cincom Systems, Inc. All Rights Reserved. "

TextEditorCtrl modeDescription: 'Brief';

" Brief standard key bindings -----------------------------------------"

	onKey: #End do: [ :editor |
	(editor lastKey == #End) ifTrue: [
		(editor lastLastKey == #End) ifTrue: [
			editor cursorEof.
		] ifFalse: [
			editor cursorDown: #page.
		].
	] ifFalse: [ editor cursorRight: #end .  ]. ];
	onKey: #Home do: [ :editor |
	(editor lastKey == #Home) ifTrue: [
		(editor lastLastKey == #Home) ifTrue: [
			editor cursorHome.
		] ifFalse: [
			editor cursorUp: #page.
		].
	] ifFalse: [ editor cursorLeft: #end .  ]. ];
	onKey: #KP_Multiply do: #undo;
	onKey: #KP_Add do: [ :editor | editor selection == nil ifTrue: [
		editor formItem copyToClipboard: nil from: ((editor curpos) x: 1)
				to: ((editor curpos) x: 10000) append: false.
		] ifFalse: [
			editor copyToClipboard.
			editor hideSelection.
		]. ];
	onKey: #KP_Subtract do: [ :editor |
		editor selection == nil ifTrue: [
			editor deleteLine.
		] ifFalse: [
			editor deleteSelection.
		]. ];
	onKey:  #AltA do: [ :editor | editor toggleSelectionType: #blknormal ];
	onKey:  #AltB do: #showWindowList;
	onKey:  #AltC do: [ :editor | editor toggleSelectionType: #blkcols ];
	onKey:  #AltD do: #deleteLine;
	onKey:  #AltG do: #gotoLine;
	onKey:  #AltK do: [ :editor | editor deleteChar: #end ];
	onKey:  #CtrlL do: [ :editor | editor toggleSelectionType: #blklines ];
	onKey:  #CtrlM do: [ :editor | editor toggleSelectionType: #blknormal ];
	onKey:  #AltN do: #nextWindow;
	onKey:  #AltO do: #saveAs;
	onKey:  #Altminus do: #previousWindow;
	onKey:  #Ctrlminus do: #quitFile;
	onKey:  #AltU do: #undo;
	onKey:  #AltI do: #insertFile;
" commented out to make menu mnemonic accelerators work
	onKey:  #AltW do: [ :editor | (editor selection) == nil ifTrue: [
				editor save.
			] ifFalse: [
				editor writeSelection.
			].];
	"
	onKey:  #AltX do: #quit;
	onKey:  #Tab do: [ :editor | (editor selection) == nil ifTrue: [
				editor insert: (9 asChar).
			] ifFalse: [
				editor shiftSelectionRight.
			].];
	onKey:  #ShiftTab do: [ :editor | (editor selection) == nil ifTrue: [
				editor cursorLeft: #single.
			] ifFalse: [
				editor shiftSelectionLeft.
			].];

	onKey: #F5              do: #search;
	onKey: #F3              do: #searchAgainForward;
	onKey: #CtrlS           do: #search;
	onKey: #ShiftF5         do: #searchAgainForward;
	onKey: #AltF5           do: #searchAgainBackward;

	onKey: #F6              do: #replace;
	onKey: #ShiftF6         do: #replaceAgain;
	onKey: #AltR            do: #replace;
	onKey: #CtrlF5          do: [ :editor |
			(editor toggleSearchOption: #ignorecase) == true ifTrue: [
				editor showStatus: 'Case sensitive search is off'.
			] ifFalse: [
				editor showStatus: 'Case sensitive search is on'.
			]. ];
	onKey: #CtrlF6          do: [ :editor |
			(editor toggleSearchOption: #regex) == true ifTrue: [
				editor showStatus: 'Regular expression search is on'.
			] ifFalse: [
				editor showStatus: 'Regular expression search is off'.
			]. ];

	onKey: #Ctrl1   do: [ :editor |
			editor setBookmark: #'Bookmark 1'. ];
	onKey: #Ctrl2   do: [ :editor |
			editor setBookmark: #'Bookmark 2'. ];
	onKey: #Alt1            do: [ :editor |
			editor gotoBookmark: #'Bookmark 1'. ];
	onKey: #Alt2            do: [ :editor |
			editor gotoBookmark: #'Bookmark 2'. ];

" Extensions to Brief standard key bindings ------------------------------"

	onKey: #ShiftNext do: [ :item | item cursorDown: { #extend #page } ];
	onKey: #ShiftPrior do: [ :item | item cursorUp: { #extend #page } ];
	onKey: #ShiftCtrlRight do: [ :item | item cursorRight: { #extend #word } ];
	onKey: #ShiftCtrlLeft do: [ :item | item cursorLeft: { #extend #word } ];
	onKey: #CtrlK do: [ :editor | editor scrollUp. ];
	onKey: #CtrlJ do: [ :editor | editor scrollDown. ];
	onKey: #CtrlE do: #execute;
	onKey: #CtrlI do: #inspectSelection;
	onKey: #AltT do: #insertTemplate;
	onKey: #F9 do: #loadAsClassMethods;
	onKey: #CtrlF9 do: #reloadAsClassMethods;
	onKey: #ShiftF9 do: #executeSelection;

	onKey: #F11 do: #lowerCaseSelection;
	onKey: #CtrlF11 do: #upperCaseSelection;
	onKey: #ShiftF11 do: #upperCaseSelection;

	onKey: #F10 do: #formatSelection;
	onKey: #ShiftF10 do: #convertToTabsSelection;
	onKey: #CtrlF10 do: #convertToSpacesSelection;
	onKey: #ShiftCtrlEnd do: [ :editor | editor cursorDown: {#extend #file}. ];
	onKey: #ShiftCtrlHome do: [ :editor | editor cursorUp: {#extend #file}. ];
	onKey: #Ctrlnumbersign do: #toggleTopWindows;
	onKey: #F12 do: [ :editor |
			editor showStatus: 'reading ini file'.
			editor class readIniFile.
			editor showStatus: 'done.'
		];
	onKey: #ShiftDelete do: #deleteSelection;
	onKey: #CtrlF   do: #search;
	onKey: #CtrlR   do: #replace;
	onKey: #CtrlA   do: #selectAll;
	onKey: #CtrlB   do: #searchAgainBackward;
	onKey: #CtrlG   do: #searchAgainForward;
	onKey: #CtrlO   do: #openFile;
	onKey: #CtrlQ   do: #quitFile;
	onKey: #CtrlW   do: #save;
	onKey: #CtrlU   do: #scanDirs;
	onKey: #CtrlN   do: #diffNext;
	onKey: #CtrlP   do: #diffPrevious;
	onKey: #F7              do: #recordMacro;
	onKey: #F8              do: #playMacro;
	onKey: #F2              do: #searchCursorWordForward;
	onKey: #ShiftF2 do: #searchCursorWordBackward;
	onKey: #CtrlF2  do: #matchBracket;
	onKey: #CtrlF8  do: #searchSenders;
	onKey: #ShiftF8 do: #searchImplementors;
	onKey: #Insert  do: #toggleInsert;
	onKey: #Altperiod       do: #gotoPreviousPos;

"	AIX keyboard glitches "
	onKey: #Altplus do: [ :editor | editor insert: $~ ];

