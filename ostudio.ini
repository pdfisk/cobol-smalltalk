                { '#IE ' [ :editor | editor abbreviate: 'IE ' with: #IfTrueElse; cursorDown: 1; cursorRight: #end ]}
                { '#IT ' [ :editor | editor abbreviate: 'IT ' with: #IfTrue; cursorDown: 1; cursorRight: #end ]}
                { '#IF ' [ :editor | editor abbreviate: 'IF ' with: #IfFalse; cursorDown: 1; cursorRight: #end ]}
